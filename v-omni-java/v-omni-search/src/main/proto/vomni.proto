syntax = "proto3";

package vomni;

// 根据你的项目结构调整
option java_package = "org.example.vomnisearch.grpc";
option java_multiple_files = true;

service Recommender {
  // 1. 实时获取用户推荐画像 (含不对称特征处理)
  rpc GetUserEmbedding (RecommendRequest) returns (RecommendResponse);

  // 2. 长期兴趣质心演化 (512维 K-Means 聚类)
  rpc UpdateLongTermMatrix (UpdateMatrixRequest) returns (UpdateMatrixResponse);

  // 3. CLIP 工具类
  rpc GetImageEmbeddings (ImageRequest) returns (MultiVectorResponse);
  rpc GetTextEmbedding (TextRequest) returns (VectorResponse);
}

// ----------------- 推理相关 -----------------

message RecommendRequest {
  string user_id = 1;

  // [0] 是上一个状态的 512D 用户画像 (用于 Query)
  repeated Vector q_5_videos = 2;

  // --- 短期兴趣 (灵敏头) ---
  // Key: 1024D (视觉512 + 文本512)
  repeated Vector short_k = 3;
  // Value: 1028D (1024语义 + 4业务分)
  repeated Vector short_v = 4;

  // --- 长期兴趣 (死板头) ---
  // Key: 512D (纯视频语义质心)
  repeated Vector long_k = 5;
  // Value: 512D (通常与 long_k 相同)
  repeated Vector long_v = 6;
}

message RecommendResponse {
  string status = 1;
  repeated float user_embedding = 2; // 返回 512D 向量
  string message = 3;
}

// ----------------- 画像更新相关 -----------------

message UpdateMatrixRequest {
  string user_id = 1;
  // 旧的 64 x 512 质心矩阵
  repeated Vector old_centroids = 2;
  // 本周新增的 N x 512 原始视频向量
  repeated Vector new_behaviors = 3;
}

message UpdateMatrixResponse {
  string status = 1;
  // 聚类后的新 64 x 512 质心矩阵
  repeated Vector new_centroids = 2;
}

// ----------------- 基础结构 -----------------

message Vector {
  repeated float values = 1;
}

message ImageRequest {
  repeated bytes image_data = 1;
  bool do_pooling = 2;
}

message TextRequest {
  string text = 1;
}

message VectorResponse {
  repeated float values = 1;
}

message MultiVectorResponse {
  repeated Vector vectors = 1;
}