spring:

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50   # Lettuce 连接池最大连接数（建议比 Jedis 小很多）
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms
          time-between-eviction-runs: 30s

  # Kafka（关键修复点）
  kafka:
    bootstrap-servers: localhost:19092
    producer:
      # 使用 Json 序列化，方便发送对象
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: v-omni-interaction-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      max-poll-records: 500
      enable-auto-commit: true
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      # 正确的批量配置位置
      type: batch
      # 即使没满500条，超过这个时间也会强制交付给监听器
      poll-timeout: 1000ms


  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/omni_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: ${V_OMNI_DATASOURCE_PASSWORD}

  elasticsearch:
    uris: http://localhost:19200

minio:
  base-url: http://localhost:9000  # 或者你实际的 Minio 访问地址