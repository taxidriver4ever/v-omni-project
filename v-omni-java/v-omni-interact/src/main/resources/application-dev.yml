spring:

  # Redis
  data:
    redis:
      host: localhost
      port: 16379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50   # Lettuce 连接池最大连接数（建议比 Jedis 小很多）
          max-idle: 20
          min-idle: 5
          max-wait: 1000ms
          time-between-eviction-runs: 30s
      password: ${V_OMNI_REDIS_PASSWORD}
      username: ${V_OMNI_REDIS_USERNAME}

  # Kafka（关键修复点）
  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: v-omni-interaction-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      max-poll-records: 500
      # 1. 关闭自动提交，交给 Spring 事务管理
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
    listener:
      type: batch
      poll-timeout: 1000ms
      # 2. 配置 AckMode为 RECORD 或 BATCH
      # 当有 @Transactional 时，Spring 会在整个事务成功后，自动帮你提交这批消息的 Offset
      ack-mode: batch


  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:13306/omni_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: ${V_OMNI_DATASOURCE_PASSWORD}

  elasticsearch:
    uris: http://localhost:19200