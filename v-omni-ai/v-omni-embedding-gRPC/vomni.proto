syntax = "proto3";

package vomni;

option java_package = "com.vomni.grpc";
option java_multiple_files = true;

service Recommender {
  rpc GetUserEmbedding (RecommendRequest) returns (RecommendResponse);
  rpc GetImageEmbeddings (ImageRequest) returns (MultiVectorResponse);
  rpc GetTextEmbedding (TextRequest) returns (VectorResponse);
}

message ImageRequest {
  repeated bytes image_data = 1;
  bool do_pooling = 2;           // 新增：是否进行均值池化
}

message RecommendRequest {
  repeated Vector q_5_videos = 1;
  repeated Vector short_k = 2;
  repeated Vector long_k = 3;
  repeated float short_weights = 4;
}

message TextRequest {
  string text = 1;
}

message Vector {
  repeated float values = 1;
}

message RecommendResponse {
  string status = 1;
  repeated float user_embedding = 2;
}

message VectorResponse {
  repeated float values = 1;
}

message MultiVectorResponse {
  repeated Vector vectors = 1;
}