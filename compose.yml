version: '3.8'

services:

  # auth-service:
  #   image: v-omni-auth:v6
  #   ports:
  #     - "18281:18281"
  #   env_file:
  #     - v-omni-java/v-omni-auth/.env
  #   environment:
  #     # 🚨 强制覆盖（防止 yml 没生效）
  #     - SPRING_KAFKA_BOOTSTRAP_SERVERS=my-kafka:9092
  #     - SPRING_REDIS_HOST=my-redis
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/omni_db
  #   depends_on:
  #     - my-redis
  #     - my-kafka
  #     - my-mysql
  #   networks:
  #     - v-omni-network

  my-mysql:
    image: mysql:8.0
    container_name: mysql-server
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    volumes:
      - ./mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - v-omni-network

  my-redis:
    image: redis:7.0
    container_name: my-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    networks:
      - v-omni-network

  my-kafka:
    image: apache/kafka:latest
    container_name: my-kafka   # ✅ 统一名字（非常重要）
    ports:
      - "9092:9092"
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://my-kafka:9092,EXTERNAL://localhost:19092

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@my-kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - v-omni-network

  my-minio:
    image: minio/minio:latest
    container_name: my-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
      # 启用 Kafka 通知（PRIMARY 是自定义标识符，可任意取名）
      MINIO_NOTIFY_KAFKA_ENABLE_PRIMARY: "on"
      MINIO_NOTIFY_KAFKA_BROKERS_PRIMARY: "my-kafka:9092"
      MINIO_NOTIFY_KAFKA_TOPIC_PRIMARY: "minio-url-topic"
    volumes:
      - ./minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - v-omni-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      my-minio:
        condition: service_healthy
    networks:
      - v-omni-network
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to warm up Kafka connection...';
      sleep 10;
      mc alias set myminio http://my-minio:9000 admin password123;
      mc mb --ignore-existing myminio/raws-video;
      mc mb --ignore-existing myminio/tmp-extraction-image;
      mc mb --ignore-existing myminio/final-video;
      mc ilm rule add --expire-days 1 myminio/raws-video;
      mc ilm rule add --expire-days 1 myminio/tmp-extraction-image;
      # 尝试绑定，如果失败则等待 5 秒再试一次（增加鲁棒性）
      mc event add myminio/raws-video arn:minio:sqs::PRIMARY:kafka --event put || 
      (sleep 5 && mc event add myminio/raws-video arn:minio:sqs::PRIMARY:kafka --event put);
      echo 'MinIO initialization completed';
      exit 0;
      "

  my-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: my-elasticsearch
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # 🚨 关闭认证（开发环境必备）
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - ./es-data:/usr/share/elasticsearch/data
    networks:
      - v-omni-network

  my-kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: my-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://my-elasticsearch:9200
    depends_on:
      - my-elasticsearch
    networks:
      - v-omni-network

networks:
  v-omni-network:
    driver: bridge